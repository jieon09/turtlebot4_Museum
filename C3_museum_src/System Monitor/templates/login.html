<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Museum Security - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>보안 관제 시스템</h2>
        <p class="subtitle">MUSEUM SECURITY ACCESS</p>

        <form action="/login_process" method="POST">
            <div class="input-group">
                <label>ADMIN ID</label>
                <input type="text" name="username" placeholder="사원 번호를 입력하세요" required>
            </div>
            
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">시스템 접속</button>
        </form>

        <div class="footer">
            <span>신규 관리자이신가요?</span>
            <button type="button" class="reg-btn" onclick="location.href='/register'">
                계정 등록
            </button>
        </div>
    </div>
</body>
</html>
