<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Museum Security - 관리자 등록</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>

    <div class="register-container">
        <h2>관리자 신규 등록</h2>
        <p class="subtitle">MUSEUM SECURITY NEW ADMIN</p>

        <form action="/register_process" method="POST">
            
            <div class="form-section">
                <div class="input-group">
                    <label>사원 ID (영문/숫자)</label>
                    <input type="text" name="emp_id" pattern="[a-zA-Z0-9]+" title="영문과 숫자만 입력하세요" required>
                </div>
                
                <div class="input-group">
                    <label>비밀번호 (4자리 이상)</label>
                    <input type="password" name="password" minlength="4" required>
                </div>

                <div class="input-group">
                    <label>이름</label>
                    <input type="text" name="name" required>
                </div>

                <div class="input-group">
                    <label>전화번호</label>
                    <input type="tel" name="phone" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" placeholder="010-0000-0000" required>
                </div>

                <div class="input-group">
                    <label>관리자 허가번호 (Master Code)</label>
                    <input type="password" name="auth_code" required>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="submit-btn">등록 완료</button>
                <button type="button" class="cancel-btn" onclick="location.href='/'">취소</button>
            </div>
            
        </form>
    </div>

</body>
</html>
