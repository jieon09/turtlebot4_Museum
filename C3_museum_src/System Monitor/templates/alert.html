<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🚨 SECURITY ALERT</title>

<style>
body {
    margin:0;
    background:#020617;
    color:white;
    font-family:sans-serif;
}

.container {
    padding:20px;
}

.top {
    display:flex;
    gap:10px;
}

.cam {
    flex:1;
    background:black;
    border-radius:12px;
    overflow:hidden;
}

.cam img {
    width:100%;
    height:250px;
    object-fit:contain;
}

.log-box {
    margin-top:15px;
    background:#0f172a;
    padding:15px;
    border-radius:12px;
}

.log-box p {
    margin:5px 0;
}

.btns {
    margin-top:15px;
    display:flex;
    gap:10px;
}

.btn {
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.report {
    background:#f87171;
}

.ignore {
    background:#1e293b;
    color:white;
}
</style>
</head>

<body>
<div class="container">

    <!-- 카메라 -->
    <div class="top">

        <!-- CCTV -->
        <div class="cam">
            <h3>📷 CCTV 캡쳐</h3>
            <img id="capture_img" src="">
        </div>

        <!-- DB 이미지 -->
        <div class="cam">
            <h3>🖼️ DB 이미지</h3>
            <img id="db_img" src="">
        </div>

    </div>

    <!-- 로그 -->
    <div class="log-box" id="log-box">
        <p>🚨 도난이 감지되었습니다.</p>
        <p>전시품: GOLD_STATUE_01</p>
        <p>위치: ZONE A</p>
        <p>시간: <span id="time"></span></p>
    </div>

    <!-- 버튼 -->
    <div class="btns">
        <button class="btn report" onclick="report()">신고</button>
        <button class="btn ignore" onclick="ignore()">무시</button>
    </div>

</div>

<script>

document.getElementById("time").innerText = new Date().toLocaleString();

function ignore() {
    fetch('/clear_alert', {method:'POST'})
    .then(()=>window.close());
}

async function loadAlert() {
    const res = await fetch('/alert_status');
    const data = await res.json();

    console.log("alert data:", data);

    if (data.active && data.missing_items && data.missing_items.length > 0) {

        const item = data.missing_items[0];

        // 🔥 1. 캡쳐 이미지
        document.getElementById("capture_img").src = data.captured_image;

        // 🔥 2. DB 이미지
        document.getElementById("db_img").src = item.image;

        // 🔥 텍스트 업데이트
        document.querySelector(".log-box").innerHTML = `
            <p>🚨 도난 감지</p>
            <p>ID: ${item.id}</p>
            <p>이름: ${item.name}</p>
            <p>위치: ${item.location}</p>
            <p>시간: ${new Date().toLocaleString()}</p>
        `;

    } else {
        document.querySelector(".log-box").innerHTML = "<p>도난 정보 없음</p>";
    }
}
// 최초 실행
loadAlert();
function report() {// 🔥 log-box 내용 그대로 가져오기
    const logBox = document.querySelector(".log-box");

    if (!logBox) {
        alert("로그 없음");
        return;
    }

    // 🔥 텍스트만 추출 (HTML 태그 제거)
    const message = logBox.innerText.trim();

    if (confirm("경보 SMS를 전송하시겠습니까?")) {
        fetch('/send_sms', { 
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                to_number: '01081843638',
                text: message
            })
        })
        .then(r => r.json())
        .then(d => alert(d.success ? "발송 성공" : "실패"));
    }
}

</script>

</body>
</html>
